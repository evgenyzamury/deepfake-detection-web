<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Image Deepfake Detection</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <h1 class="mb-3 text-center">Image Deepfake Detection</h1>
        <p class="text-center text-muted">Пришли фото, и я скажу, настоящее оно или нет!</p>

        <blockquote class="blockquote text-center">
            <p class="mb-1 fst-italic">Рекомендации:</p>
            <cite class="small">— Загрузите квадратное изображение лица</cite>
        </blockquote>

        {% if error %}
        <div class="alert alert-warning text-center" role="alert">
            {{ error }}
        </div>
        {% endif %}

        <form action="/upload" method="post" enctype="multipart/form-data" class="row g-3 justify-content-center mb-4">
            <div class="col-auto">
                <input type="file" name="image" class="form-control">
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-primary">Проверить</button>
            </div>
        </form>

        {% if is_image_load %}
        <div class="text-center mt-4">
            {% if result == 0 %}
            <div class="alert alert-success" role="alert">
                ✅ Реальное изображение
            </div>
            {% else %}
            <div class="alert alert-danger" role="alert">
                🚨 Обнаружен фейк!
            </div>
            {% endif %}

            <img src="{{ uploaded_image }}" alt="Загруженное изображение"
                 class="img-fluid rounded shadow-sm" style="max-width: 300px;">
        </div>
        {% endif %}
    </div>

    <!-- Bootstrap JS (опционально, для интерактивных компонентов) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
